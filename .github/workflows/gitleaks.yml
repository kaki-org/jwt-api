name: Secret scan

# プルリクエスト作成時と develop/main への push 時に秘密情報をスキャンする。
# 過去履歴は鍵ローテーション済み・意図的に未書換のため、履歴全体ではなく
# 作業ツリー(`gitleaks dir`)のみを走査し新規混入のみを検出する。
on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - develop
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    # 10分間のタイムアウトを設定
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan working tree (no git history)
        run: |
          gitleaks dir . \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            --verbose \
            --exit-code 1
